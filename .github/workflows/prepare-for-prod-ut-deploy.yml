name: Prepare for UT Production Environment Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  generate-tag-names:
    runs-on: ubuntu-latest
    name: Generate Tag Names
    permissions:
      contents: read # to checkout repository code and read package.json (actions/checkout)
    outputs:
      tag_name_ut: ${{ steps.gen_tag_names.outputs.tag_name_ut }}
      tag_name: ${{ steps.gen_tag_names.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Generate Tag Names
        id: gen_tag_names
        run: |
          tag_name=$(jq -r .version package.json)
          echo "Tag Name: $tag_name"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

          tag_name_ut="ut-$tag_name"
          echo "UT Tag Name: $tag_name_ut"
          echo "tag_name_ut=$tag_name_ut" >> $GITHUB_OUTPUT

  build-user-transformer-image:
    name: Build User Transformer Docker Image - Prod
    permissions:
      id-token: write # to pass OIDC token to reusable workflow (build-push-docker-image.yml)
      contents: read # to checkout repository code and call reusable workflow (actions/checkout)
    needs: [generate-tag-names]
    uses: ./.github/workflows/build-push-docker-image.yml
    with:
      image_repo: rudderstack/rudder-transformer
      image_tag: ${{ needs.generate-tag-names.outputs.tag_name_ut }}
      dockerfile: Dockerfile-ut-func
      load_target: development
      push_target: production
      build_type: ut
      use_merge_sha: true
      skip_tests: true
      create_latest_tag: true
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  create-pull-request:
    name: Update Helm Charts For Production and Create Pull Request
    runs-on: ubuntu-latest
    needs: [generate-tag-names, build-user-transformer-image]

    permissions:
      contents: read # to checkout repository code; cross-repo writes use app token (create-github-app-token)

    env:
      UT_TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name_ut }}
      TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits and push branches
          permission-pull-requests: write # to create and update PRs
          repositories: rudder-devops # to access cross-repo

      - name: Checkout Devops Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Print Docker Image Tags
        run: |
          echo "User Transformer: $UT_TAG_NAME"

      - name: Checkout Devops Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rudderlabs/rudder-devops
          token: ${{ steps.generate-token.outputs.token }}
          path: rudder-devops

      - name: Extract branch name
        id: extract_branch_name
        run: |
          cd rudder-devops
          branch_name=$(git rev-parse --abbrev-ref HEAD)
          echo "branch_name=$branch_name"
          echo "branch_name=$branch_name" >> $GITHUB_OUTPUT

      - name: Update Helm Charts and Raise Pull Request
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          cd helm-charts/shared-services/per-az/environment/production
          yq eval -i ".user-transformer.image.tag=\"$UT_TAG_NAME\"" production.yaml
          yq eval -i ".user-transformer.image.tag=\"$UT_TAG_NAME\"" enterprise/enterprise.yaml
          yq eval -i ".user-transformer.image.tag=\"$UT_TAG_NAME\"" multi-tenant/multi-tenant.yaml
          cd ../../../../config-be-rudder-transformer/environment/prod
          yq eval -i ".config-be-user-transformer.image.tag=\"$UT_TAG_NAME\"" base.yaml

      - name: Create shared user-transformers branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/shared-user-transformer-$UT_TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for shared user-transformers
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          branch-name: shared-user-transformer-${{ env.UT_TAG_NAME }}
          commit-message: 'chore: upgrade shared user-transformers to ${{ env.UT_TAG_NAME }}'
          files: |
            helm-charts/shared-services/per-az/environment/production/production.yaml
            helm-charts/shared-services/per-az/environment/production/enterprise/enterprise.yaml
            helm-charts/shared-services/per-az/environment/production/multi-tenant/multi-tenant.yaml
            helm-charts/config-be-rudder-transformer/environment/prod/base.yaml

      - name: Create PR for shared user-transformers
        id: shared-pr
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "shared-user-transformer-$UT_TAG_NAME" \
            --title "chore: upgrade shared user-transformers to $UT_TAG_NAME" \
            --body "Automated PR to update production shared user-transformers image to $UT_TAG_NAME")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Update image tag in devops repo for hosted user-transformer
        run: |
          cd customer-objects/multi-tenant-us
          yq eval -i ".spec.user-transformer.image.version=\"$UT_TAG_NAME\"" hostedmtedmt.yaml

      - name: Create hosted user-transformer branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/hosted-user-transformer-$UT_TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for hosted user-transformer
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          branch-name: hosted-user-transformer-${{ env.UT_TAG_NAME }}
          commit-message: 'chore: upgrade hosted user-transformer to ${{ env.UT_TAG_NAME }}'
          files: |
            customer-objects/multi-tenant-us/hostedmtedmt.yaml

      - name: Create PR for hosted user-transformer
        id: hosted-pr
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "hosted-user-transformer-$UT_TAG_NAME" \
            --title "chore: upgrade hosted user-transformer to $UT_TAG_NAME" \
            --body "Automated PR to update production hosted user-transformer image to $UT_TAG_NAME")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Collect dedicated user-transformer files and update tags
        id: collect-dedicated-files
        run: |
          cd customer-objects

          declare -a enabled_ut_customers=()
          declare -a sub_directories=('enterprise-us' 'enterprise-eu')

          # identify the customers enabled in sub-directories
          for directory in "${sub_directories[@]}"; do
            for f in "./$directory"/*; do
              [[ -f $f ]] || continue

              enabled="$(yq e '.spec.user-transformer.enabled' $f)"
              if [ "$enabled" == "true" ]; then
                enabled_ut_customers+=( $f )
              fi
            done
          done

          # bump up the customers version
          files_list=""
          for customer in "${enabled_ut_customers[@]}"; do
            yq eval -i ".spec.user-transformer.image.version=\"$UT_TAG_NAME\"" $customer
            # Convert relative path (./enterprise-us/foo.yaml) to repo-root path
            files_list="${files_list}customer-objects/${customer#./}\n"
          done

          # Write files list to a temp file for use by signed commit action
          printf "%b" "$files_list" > /tmp/dedicated_files.txt
          echo "Files to commit:"
          cat /tmp/dedicated_files.txt

          # Store as multiline output
          {
            echo "files<<EOF"
            cat /tmp/dedicated_files.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create dedicated user-transformer branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/dedicated-user-transformer-$TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for dedicated user-transformers
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          branch-name: dedicated-user-transformer-${{ env.TAG_NAME }}
          commit-message: 'chore: upgrade dedicated user transformers to ${{ env.TAG_NAME }}'
          files: ${{ steps.collect-dedicated-files.outputs.files }}

      - name: Create PR for dedicated user-transformers
        id: dedicated-pr
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          PR_URL=$(gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "dedicated-user-transformer-$TAG_NAME" \
            --title "chore: upgrade dedicated user transformers to $TAG_NAME" \
            --body "Automated PR to update dedicated user transformer default version to $TAG_NAME")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Notify Control Plane Team
        uses: slackapi/slack-github-action@91efab103c0de0a537f72a35f6b8cda0ee76bf0a # v2.1.1
        continue-on-error: true
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ secrets.SLACK_CONTROL_PLANE_CHANNEL_ID }}",
              "text": "*UT Deployment PRs Created*\nCC: @control-plane-on-call",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 User Transformer Deployment - DevOps PRs Ready"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Version: `${{ needs.generate-tag-names.outputs.tag_name_ut }}`\n\nPRs created for review:\n• <${{ steps.shared-pr.outputs.pr_url }}|Shared User Transformer>\n• <${{ steps.hosted-pr.outputs.pr_url }}|Hosted User Transformer>\n• <${{ steps.dedicated-pr.outputs.pr_url }}|Dedicated User Transformer>\n\nPlease review and merge the DevOps PRs."
                  }
                }
              ]
            }

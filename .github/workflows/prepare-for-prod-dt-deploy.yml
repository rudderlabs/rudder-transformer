name: Prepare for DT Production Environment Deployment

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-tag-names:
    runs-on: ubuntu-latest
    name: Generate Tag Names
    permissions:
      contents: read # to checkout repository code and read package.json (actions/checkout)
    outputs:
      tag_name: ${{ steps.gen_tag_names.outputs.tag_name }}
      tag_name_ut: ${{ steps.gen_tag_names.outputs.tag_name_ut }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Generate Tag Names
        id: gen_tag_names
        run: |
          tag_name=$(jq -r .version package.json)
          echo "Tag Name: $tag_name"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

  build-transformer-image:
    name: Build Transformer Docker Image - Prod
    permissions:
      id-token: write # to pass OIDC token to reusable workflow (build-push-docker-image.yml)
      contents: read # to checkout repository code and call reusable workflow (actions/checkout)
    needs: [generate-tag-names]
    uses: ./.github/workflows/build-push-docker-image.yml
    with:
      image_repo: rudderstack/rudder-transformer
      image_tag: ${{ needs.generate-tag-names.outputs.tag_name }}
      dockerfile: Dockerfile
      load_target: development
      push_target: production
      build_type: dt
      use_merge_sha: true
      skip_tests: true
      create_latest_tag: true
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  create-pull-request-shared-transformers:
    name: Create PR for Shared Transformers (devops)
    runs-on: ubuntu-latest
    needs: [generate-tag-names, build-transformer-image]

    permissions:
      contents: read # to checkout repository code; cross-repo writes use app token (create-github-app-token)

    env:
      TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits and push branches
          permission-pull-requests: write # to create and update PRs
          repositories: rudder-devops # to access cross-repo

      - name: Checkout Devops Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rudderlabs/rudder-devops
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update image tags in devops repo for shared transformers
        run: |
          cd helm-charts/shared-services/per-az/environment/production
          yq eval -i ".rudder-transformer.image.tag=\"$TAG_NAME\"" production.yaml
          yq eval -i ".rudder-transformer.image.tag=\"$TAG_NAME\"" enterprise/enterprise.yaml
          yq eval -i ".rudder-transformer.image.tag=\"$TAG_NAME\"" multi-tenant/multi-tenant.yaml
          cd ../../../../config-be-rudder-transformer/environment/prod
          yq eval -i ".config-be-rudder-transformer.image.tag=\"$TAG_NAME\"" base.yaml

      - name: Create shared transformers branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/shared-transformer-$TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for shared transformers
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          branch-name: shared-transformer-${{ env.TAG_NAME }}
          commit-message: 'chore: upgrade shared transformers to ${{ env.TAG_NAME }}'
          files: |
            helm-charts/shared-services/per-az/environment/production/production.yaml
            helm-charts/shared-services/per-az/environment/production/enterprise/enterprise.yaml
            helm-charts/shared-services/per-az/environment/production/multi-tenant/multi-tenant.yaml
            helm-charts/config-be-rudder-transformer/environment/prod/base.yaml

      - name: Create PR for shared transformers
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "shared-transformer-$TAG_NAME" \
            --title "chore: upgrade shared transformers to $TAG_NAME" \
            --body "Automated PR to update production shared transformers image to $TAG_NAME"

  create-pull-request-hosted-transformer:
    name: Create PR for Hosted Transformer (devops)
    runs-on: ubuntu-latest
    needs: [generate-tag-names, build-transformer-image]

    permissions:
      contents: read # to checkout repository code; cross-repo writes use app token (create-github-app-token)

    env:
      TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits and push branches
          permission-pull-requests: write # to create and update PRs
          repositories: rudder-devops # to access cross-repo

      - name: Checkout Devops Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rudderlabs/rudder-devops
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update image tag in devops repo for hosted transformer
        run: |
          cd customer-objects/multi-tenant-us
          yq eval -i ".spec.transformer.image.version=\"$TAG_NAME\"" hostedmtedmt.yaml

      - name: Create hosted transformer branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/hosted-transformer-$TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for hosted transformer
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          branch-name: hosted-transformer-${{ env.TAG_NAME }}
          commit-message: 'chore: upgrade hosted transformer to ${{ env.TAG_NAME }}'
          files: |
            customer-objects/multi-tenant-us/hostedmtedmt.yaml

      - name: Create PR for hosted transformer
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "hosted-transformer-$TAG_NAME" \
            --title "chore: upgrade hosted transformer to $TAG_NAME" \
            --body "Automated PR to update production hosted transformer image to $TAG_NAME"

  create-pull-request-dedicated-transformer:
    name: Create PR for Dedicated Transformer (operator)
    runs-on: ubuntu-latest
    needs: [generate-tag-names, build-transformer-image]

    permissions:
      contents: read # to checkout repository code; cross-repo writes use app token (create-github-app-token)

    env:
      TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits and push branches
          permission-pull-requests: write # to create and update PRs
          repositories: rudderstack-operator # to access cross-repo

      - name: Checkout Operator Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rudderlabs/rudderstack-operator
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update image tag in operator repo for dedicated transformer
        run: |
          cd operator-helm/valuefiles
          yq eval -i ".transformer.image.version=\"$TAG_NAME\"" values.yaml

      - name: Create dedicated transformer branch on remote
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(git rev-parse HEAD)
          gh api repos/rudderlabs/rudderstack-operator/git/refs \
            --method POST \
            -f ref="refs/heads/dedicated-transformer-$TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for dedicated transformer
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudderstack-operator
          branch-name: dedicated-transformer-${{ env.TAG_NAME }}
          commit-message: 'chore: upgrade dedicated transformer default version to ${{ env.TAG_NAME }}'
          files: |
            operator-helm/valuefiles/values.yaml

      - name: Create PR for dedicated transformer
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr create \
            --repo rudderlabs/rudderstack-operator \
            --base master \
            --head "dedicated-transformer-$TAG_NAME" \
            --title "chore: upgrade dedicated transformer default version to $TAG_NAME" \
            --body "Automated PR to update dedicated transformer default version to $TAG_NAME"

name: Verify Server start

on:
  pull_request:
    types: ['opened', 'reopened', 'synchronize']

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-health:
    runs-on: ubuntu-latest
    permissions:
      contents: read # to checkout repository code (actions/checkout)

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci && npm run prepare

      - name: Build Project
        run: npm run build

      - name: Verify Server Startup (no cluster)
        working-directory: ./dist
        run: ../.github/scripts/verifyServerStart.sh
        env:
          CLUSTER_ENABLED: 'false'
          STATS_CLIENT: 'prometheus'

      - name: Verify Server Startup (cluster with 4 workers)
        working-directory: ./dist
        run: ../.github/scripts/verifyServerStart.sh
        env:
          CLUSTER_ENABLED: 'true'
          NUM_PROCS: '4'
          STATS_CLIENT: 'prometheus'
          CLUSTER_MANAGER_SHUTDOWN_TIMEOUT: '5000'

name: Prepare for Staging Environment Deployment

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  generate-tag-names:
    runs-on: ubuntu-latest
    name: Generate Tag Names
    permissions:
      contents: read # to checkout repository code and read package.json (actions/checkout)
    # Only pull requests from release candidate branches must trigger
    if: (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix-release/'))
    outputs:
      tag_name: ${{ steps.gen_tag_names.outputs.tag_name }}
      tag_name_ut: ${{ steps.gen_tag_names.outputs.tag_name_ut }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Generate Tag Names
        id: gen_tag_names
        run: |
          tag_name="staging-$(jq -r .version package.json)"
          echo "Tag Name: $tag_name"
          echo "tag_name=$tag_name" >> $GITHUB_OUTPUT

          tag_name_ut="ut-$tag_name"
          echo "UT Tag Name: $tag_name_ut"
          echo "tag_name_ut=$tag_name_ut" >> $GITHUB_OUTPUT

  build-transformer-image:
    name: Build Transformer Docker Image - Staging
    permissions:
      id-token: write # to pass OIDC token to reusable workflow (build-push-docker-image.yml)
      contents: read # to checkout repository code and call reusable workflow (actions/checkout)
    # Only pull requests from release candidate branches must trigger
    if: (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix-release/'))
    needs: [generate-tag-names]
    uses: ./.github/workflows/build-push-docker-image.yml
    with:
      image_repo: rudderstack/rudder-transformer
      image_tag: ${{ needs.generate-tag-names.outputs.tag_name }}
      dockerfile: Dockerfile
      load_target: development
      push_target: production
      use_merge_sha: true
      create_latest_tag: false
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  build-user-transformer-image:
    name: Build User Transformer Docker Image - Staging
    permissions:
      id-token: write # to pass OIDC token to reusable workflow (build-push-docker-image.yml)
      contents: read # to checkout repository code and call reusable workflow (actions/checkout)
    # Only pull requests from release candidate branches must trigger
    if: (startsWith(github.event.pull_request.head.ref, 'release/') || startsWith(github.event.pull_request.head.ref, 'hotfix-release/'))

    needs: [generate-tag-names]
    uses: ./.github/workflows/build-push-docker-image.yml
    with:
      image_repo: rudderstack/rudder-transformer
      image_tag: ${{ needs.generate-tag-names.outputs.tag_name_ut }}
      dockerfile: Dockerfile-ut-func
      load_target: development
      push_target: production
      create_latest_tag: false
    secrets:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  create-pull-request:
    name: Update Helm Charts For Staging and Create Pull Request
    runs-on: ubuntu-latest
    needs: [generate-tag-names, build-transformer-image, build-user-transformer-image]

    permissions:
      contents: read # to checkout repository code; cross-repo writes use app token (create-github-app-token)

    env:
      TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name }}
      UT_TAG_NAME: ${{ needs.generate-tag-names.outputs.tag_name_ut }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PRIVATE_KEY }}
          permission-contents: write # to create commits and push branches
          permission-pull-requests: write # to create and update PRs
          repositories: rudder-devops # to access cross-repo

      - name: Checkout Devops Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rudderlabs/rudder-devops
          token: ${{ steps.generate-token.outputs.token }}
          path: rudder-devops

      - name: Check if staging branch already exists
        id: check-branch
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BRANCH_NAME="shared-transformer-$TAG_NAME"
          if gh api repos/rudderlabs/rudder-devops/git/ref/heads/$BRANCH_NAME > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Staging deployment branch $BRANCH_NAME already exists. Skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Update image tags in devops repo for staging
        if: steps.check-branch.outputs.exists == 'false'
        run: |
          cd rudder-devops/helm-charts/shared-services/per-az/environment/staging
          yq eval -i ".rudder-transformer.image.tag=\"$TAG_NAME\"" staging.yaml
          yq eval -i ".user-transformer.image.tag=\"$TAG_NAME\"" staging.yaml
          cd ../../../../config-be-rudder-transformer/environment/staging
          yq eval -i ".config-be-rudder-transformer.image.tag=\"$TAG_NAME\"" base.yaml
          yq eval -i ".config-be-user-transformer.image.tag=\"$TAG_NAME\"" base.yaml

      - name: Create staging branch on remote
        if: steps.check-branch.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          BASE_SHA=$(cd rudder-devops && git rev-parse HEAD)
          gh api repos/rudderlabs/rudder-devops/git/refs \
            --method POST \
            -f ref="refs/heads/shared-transformer-$TAG_NAME" \
            -f sha="$BASE_SHA"

      - name: Create verified commit for staging
        if: steps.check-branch.outputs.exists == 'false'
        uses: ryancyq/github-signed-commit@d046f1493ec46c6df96e7c5a76ccbf2b1786bdf7 # use main branch with repository support
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        with:
          repository: rudderlabs/rudder-devops
          workspace: rudder-devops
          branch-name: shared-transformer-${{ env.TAG_NAME }}
          commit-message: 'chore: upgrade staging env transformers to ${{ env.TAG_NAME }}'
          files: |
            helm-charts/shared-services/per-az/environment/staging/staging.yaml
            helm-charts/config-be-rudder-transformer/environment/staging/base.yaml

      - name: Create PR for staging
        if: steps.check-branch.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh pr create \
            --repo rudderlabs/rudder-devops \
            --base master \
            --head "shared-transformer-$TAG_NAME" \
            --title "chore: upgrade staging env transformers to $TAG_NAME" \
            --body "Automated PR to update staging transformers image to $TAG_NAME"
